# Prefix: Ctrl-b (matches your Zellij tmux mode)
# Your Zellij used Ctrl-g as "lock" toggle — in tmux the prefix key
# serves a similar role (keys only trigger after prefix)

# -------------------------------------------------------------------
# General
# -------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-ghostty:sync"
set -g mouse on
# Only whitespace splits a "word", so #{mouse_word}/#{copy_cursor_word} capture
# full file paths — including Next.js segments like (group)/[id] — for the
# open-in-nvim binds below. (Also widens copy-mode double-click word selection.)
set -g word-separators " "
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format '#(echo "#{pane_current_path}" | rev | cut -d/ -f1-2 | rev):#{pane_current_command}'
set -g escape-time 0
# Wider repeat window so held H/J/K/L resize keys keep firing across the
# macOS delay-until-repeat instead of leaking through as literal text.
set -g repeat-time 600
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on

# Width of the "main" pane used by the main-vertical layout (prefix + V).
set -g main-pane-width '75%'

# -------------------------------------------------------------------
# Status bar — minimal, like your pane_frames false in Zellij
# -------------------------------------------------------------------
set -g status-style "bg=default,fg=#999999"
set -g status-left ""
# Right side = a tab-like list of ALL sessions (not just the current one), so
# background projects stay visible while attached to one session. A red ●
# precedes any session with a pending agent @notify on one of its windows;
# attached session is white, the rest grey.
#
# It reads a plain variable (@session_list), NOT a #() subshell, so it redraws
# INSTANTLY. tmux only re-runs #() on a timer (status-interval), which lagged
# session switches and new dots by up to that interval. Instead, the variable is
# rebuilt by scripts/tmux-sessions on the events that change it (hooks below),
# plus the external agent hooks rebuild it right after setting @notify.
# The script lives in a file because tmux pre-expands #{...} inside #(), which
# would clobber its inner @notify lookups.
set -g @session_list ""
set -g status-right "#{@session_list}"
set -g status-right-length 200
set -g status-right-style "fg=#999999"
set -g status-position bottom
# Red dot on a window when an agent (Claude/Codex) posts a notification.
# @notify is a per-window flag set by the agent hooks (claude/settings.json
# + scripts/codex-notify) and cleared when you focus the window.
# Shown on the current window too: with side-by-side Ghostty splits each
# running its own tmux session, a background split's window is still the
# "current" window of its own session, so it must still be able to show a dot.
# Relies on focus-events on (set above).
setw -g window-status-format " #I:#W#{?@notify,#[fg=#ee5396] ●#[default],} "
setw -g window-status-current-format " #I:#W#{?@notify,#[fg=#ee5396] ●#[fg=#ffffff],} "
# Focus-in clears the window's @notify dot, then rebuilds the session list so
# the dot vanishes immediately. Both commands live in one index-0 hook (via ;)
# so re-sourcing this file replaces it rather than stacking duplicate rebuilds.
set-hook -g pane-focus-in 'set -uw @notify ; run -b "tmux set -g @session_list \"$(~/.local/bin/tmux-sessions)\""'

# Rebuild @session_list (the status-right session tabs) whenever what it shows
# changes: switching sessions and attach/detach change which one is highlighted;
# create/close change the set of sessions. Agent hooks (Claude/Codex) run the
# same `tmux set -g @session_list …` after setting @notify, so a new dot shows
# the instant an agent finishes. All use -g (index 0) → idempotent on reload.
set-hook -g client-session-changed 'run -b "tmux set -g @session_list \"$(~/.local/bin/tmux-sessions)\""'
set-hook -g client-attached        'run -b "tmux set -g @session_list \"$(~/.local/bin/tmux-sessions)\""'
set-hook -g client-detached        'run -b "tmux set -g @session_list \"$(~/.local/bin/tmux-sessions)\""'
set-hook -g session-created        'run -b "tmux set -g @session_list \"$(~/.local/bin/tmux-sessions)\""'
set-hook -g session-closed         'run -b "tmux set -g @session_list \"$(~/.local/bin/tmux-sessions)\""'
# Populate once on (re)load, before any event fires, so the bar isn't blank.
run -b "tmux set -g @session_list \"$(~/.local/bin/tmux-sessions)\""

setw -g window-status-current-style "fg=#ffffff,bg=#111111"
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#FFC799"
set -g extended-keys on
set -g extended-keys-format csi-u

# -------------------------------------------------------------------
# Pane navigation — Ctrl+Alt+h/j/k/l (matches your Zellij shared bindings)
# These work WITHOUT prefix, just like Zellij's locked mode passthrough.
# Ctrl+Alt (not plain Alt) keeps option free for shell word-nav.
# -------------------------------------------------------------------
# When zoomed, block navigation — must unzoom (Ctrl+Alt+/) first
bind -n C-M-h if -F '#{window_zoomed_flag}' '' 'select-pane -L'
bind -n C-M-j if -F '#{window_zoomed_flag}' '' 'select-pane -D'
bind -n C-M-k if -F '#{window_zoomed_flag}' '' 'select-pane -U'
bind -n C-M-l if -F '#{window_zoomed_flag}' '' 'select-pane -R'

# -------------------------------------------------------------------
# Seamless Ctrl+hjkl navigation across tmux panes AND nvim splits
# (pairs with christoomey/vim-tmux-navigator on the nvim side)
# Coexists with Ctrl+Alt+hjkl above — Ctrl is nvim-aware, Ctrl+Alt is tmux-only.
# -------------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' "if -F '#{window_zoomed_flag}' '' 'select-pane -L'"
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' "if -F '#{window_zoomed_flag}' '' 'select-pane -D'"
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' "if -F '#{window_zoomed_flag}' '' 'select-pane -U'"
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' "if -F '#{window_zoomed_flag}' '' 'select-pane -R'"

# Also work in copy-mode (so nav works while scrolling tmux history)
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# -------------------------------------------------------------------
# Tab (window) navigation — Ctrl+Alt+n/p (matches Zellij locked mode)
# -------------------------------------------------------------------
bind -n M-n next-window
bind -n M-p previous-window

# Session navigation — Ctrl+Alt+Shift+n/p (session-level parallel of the window
# nav above). Needs extended-keys (set below). Under the CSI-u protocol Ghostty
# sends the shifted letter as base n/p + a Shift MODIFIER, which tmux names
# C-M-S-n; a legacy encoding would deliver C-M-N. tmux treats these as distinct
# keys and doesn't normalize them, so bind both to be safe.
bind -n C-M-n switch-client -n
bind -n C-M-N   switch-client -n
bind -n C-M-p switch-client -p
bind -n C-M-P   switch-client -p

# -------------------------------------------------------------------
# Tab reordering — Ctrl+Alt+i / Ctrl+Alt+o (matches Zellij MoveTab left/right)
# NOTE: Ctrl+Alt+i may clash with Tab (Ctrl+I == Tab) in some terminals.
# -------------------------------------------------------------------
bind -n C-M-i swap-window -t -1\; select-window -t -1
bind -n C-M-o swap-window -t +1\; select-window -t +1

# -------------------------------------------------------------------
# Resize — Ctrl+Alt +/- (matches Zellij shared resize)
# -------------------------------------------------------------------
bind -n C-M-= resize-pane -U 2
bind -n C-M-- resize-pane -D 2

# -------------------------------------------------------------------
# Floating popup — Ctrl+Alt+Space (option kept free for shell forward-word / opt+right)
# -------------------------------------------------------------------
bind -n C-M-Space display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# -------------------------------------------------------------------
# Prefix + pane mode (matches Zellij Ctrl-p pane mode)
# -------------------------------------------------------------------
# Split panes: d=down, r=right (matches Zellij pane mode)
bind d split-window -v -c "#{pane_current_path}"
bind r split-window -h -c "#{pane_current_path}"
# Also support tmux-standard splits
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# Navigate panes with h/j/k/l after prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Fullscreen toggle: prefix+f (matches Zellij pane mode f)
bind f resize-pane -Z

# Close pane: prefix+x (matches Zellij tmux mode x)
bind x kill-pane

# New pane: prefix+n (matches Zellij pane mode n — new pane right)
bind n split-window -h -c "#{pane_current_path}"

# Dev layout: prefix+V — big pane left (75%), two stacked right (top/bottom).
# Run in a single-pane window; main-pane-width above controls the 75% split.
bind V \
  split-window -h -c "#{pane_current_path}" \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-layout main-vertical \; \
  select-pane -L

# -------------------------------------------------------------------
# Prefix + tab (window) mode (matches Zellij Ctrl-t tab mode)
# -------------------------------------------------------------------
# New tab: prefix+c (matches Zellij tab mode n / tmux mode c)
bind c new-window -c "#{pane_current_path}"

# Go to tab by number: Ctrl+Alt+1-9 (matches Zellij tab mode 1-9)
bind -n C-M-1 select-window -t 1
bind -n C-M-2 select-window -t 2
bind -n C-M-3 select-window -t 3
bind -n C-M-4 select-window -t 4
bind -n C-M-5 select-window -t 5
bind -n C-M-6 select-window -t 6
bind -n C-M-7 select-window -t 7
bind -n C-M-8 select-window -t 8
bind -n C-M-9 select-window -t 9

# Rename tab: prefix+, (matches Zellij tmux mode ,)
bind , command-prompt -I "#W" "rename-window '%%'"

# Close tab: prefix+X (capital to avoid accidental close)
bind X kill-window

# Last tab toggle: prefix+Tab (matches Zellij tab mode tab)
bind Tab last-window

# Break pane to new tab: prefix+b (matches Zellij tab mode b)
bind b break-pane

# -------------------------------------------------------------------
# Resize mode — prefix+H/J/K/L for fine control
# (matches Zellij Ctrl-n resize mode with h/j/k/l)
# -------------------------------------------------------------------
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# -------------------------------------------------------------------
# Copy/scroll mode (matches Zellij Ctrl-s scroll mode)
# -------------------------------------------------------------------
setw -g mode-keys vi
bind s copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# Live incremental search: matches highlight as you type (default / and ? only
# mark the match after Enter). Highlight ALL matches + the current one, carbonfox.
set -g copy-mode-match-style "bg=#333333,fg=#ffffff"
set -g copy-mode-current-match-style "bg=#FFC799,fg=#111111"
bind -T copy-mode-vi / command-prompt -i -p "(search down)" "send -X search-forward-incremental '%%%'"
bind -T copy-mode-vi ? command-prompt -i -p "(search up)"   "send -X search-backward-incremental '%%%'"

# tmux-thumbs from inside scroll mode: `s` labels tokens in the current view
# (plugin + colors configured in the Plugins section below).
bind -T copy-mode-vi s run-shell -b ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.sh

# Half-page scroll in copy mode: d/u (matches Zellij scroll mode)
bind -T copy-mode-vi d send -X halfpage-down
bind -T copy-mode-vi u send -X halfpage-up

# -------------------------------------------------------------------
# Open file:line under cursor in the sibling nvim (same session+worktree).
# Handler: ~/.local/bin/tmux-open-in-nvim (Cmd can't be captured by the
# terminal mouse protocol, so the click gesture is ⌥ Option+click.)
# -------------------------------------------------------------------
# ⌥-click a path anywhere (e.g. in Claude Code's output).
bind -n M-MouseDown1Pane run-shell -b \
  "~/.local/bin/tmux-open-in-nvim '#{session_id}' '#{pane_current_path}' '#{mouse_word}'"

# In copy/scroll mode: `gf` on the word under the cursor (keeps `gg` intact),
# or ⌥-click.
bind -T copy-mode-vi g switch-client -T copymode-g
bind -T copymode-g    g send -X history-top
bind -T copymode-g    f run-shell -b \
  "~/.local/bin/tmux-open-in-nvim '#{session_id}' '#{pane_current_path}' '#{copy_cursor_word}'" \; \
  send -X cancel
bind -T copy-mode-vi M-MouseDown1Pane run-shell -b \
  "~/.local/bin/tmux-open-in-nvim '#{session_id}' '#{pane_current_path}' '#{mouse_word}'" \; \
  send -X cancel

# -------------------------------------------------------------------
# Session management (matches Zellij Ctrl-o session mode)
# -------------------------------------------------------------------
bind w choose-tree -Zs
bind D detach-client
# Rename current session (pre-filled with its current name). Sessions default
# to a number (1, 2, 3…); this gives them project names that show in the
# status-right session list above.
bind '$' command-prompt -I "#S" "rename-session '%%'"
# New session: prompt for a name, rooted in the current pane's directory
# (a bare new-session would start in $HOME). Switches you to it.
bind C command-prompt -p "New session name:" "new-session -c '#{pane_current_path}' -s '%%'"
# Session switching lives on Ctrl+Alt+Shift+n/p (see the nav section above).

# -------------------------------------------------------------------
# Reload config
# -------------------------------------------------------------------
bind R source-file ~/.config/tmux/tmux.conf\; display "Config reloaded"

# -------------------------------------------------------------------
# Ctrl+Alt+/ zooms/unzooms the current pane (same as prefix+f)
# -------------------------------------------------------------------
bind -n 'C-M-/' resize-pane -Z

# -------------------------------------------------------------------
# Plugins (TPM) — installed under ~/.tmux/plugins (home is user-owned;
# ~/.config/tmux is root-owned, so plugins can't live beside the config).
# Manage with: prefix+I install · prefix+U update · prefix+alt+u clean.
# tmux-which-key menu: Ctrl+Space (no prefix) or prefix+Space.
# Menu content is generated from ~/.tmux/plugins/tmux-which-key/config.yaml.
# -------------------------------------------------------------------
# Pin TPM's plugin dir to ~/.tmux/plugins. TPM otherwise auto-selects
# ~/.config/tmux/plugins because tmux.conf lives there — but that dir is
# root-owned and unwritable. $HOME expands here because run uses a shell.
run 'tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'

# tmux-thumbs — flash-like hint jumping. On-screen tokens get letter labels;
# type a label to copy it to the clipboard. Rust binary, built by cargo on
# prefix+I. Colors are named (thumbs doesn't take hex).
#   - prefix+F        : hint the current visible screen
#   - `s` in copy mode: hint the scrolled-back view (mnemonic: flash.nvim's `s`)
# The plugin only binds @thumbs-key in the PREFIX table, so it's set to F to
# avoid clobbering prefix+s (enter copy-mode); the copy-mode `s` bind is ours
# (see the copy/scroll section above).
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key F
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-hint-fg-color yellow
set -g @thumbs-hint-bg-color black
set -g @thumbs-select-fg-color green

# Initialize TPM — keep this line last.
run '~/.tmux/plugins/tpm/tpm'

