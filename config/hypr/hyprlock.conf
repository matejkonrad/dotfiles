background {
    monitor =
    color = rgba(15, 15, 20, 1.0)
    blur_passes = 2
}

input-field {
    monitor =
    size = 280, 50
    position = 0, -120
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    rounding = 12

    inner_color = rgba(30, 30, 40, 0.8)
    outer_color = rgba(120, 120, 160, 0.6)
    font_color = rgba(220, 220, 230, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 64
    position = 0, 80
    halign = center
    valign = center
    color = rgba(220, 220, 230, 1.0)
}
