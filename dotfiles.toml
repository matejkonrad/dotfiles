[zshenv]
source = ".zshenv"
target = "~/.zshenv"

[zshrc]
source = ".zshrc"
target = "~/.zshrc"

[nvim]
source = "config/nvim"
target = "~/.config/nvim"

[kitty]
source = "config/kitty"
target = "~/.config/kitty"

[zed]
source = "config/zed"
target = "~/.config/zed"

[git]
source = "config/git"
target = "~/.config/git"

[ghostty]
source = "config/ghostty"
target = "~/.config/ghostty"

[zellij]
source = "config/zellij"
target = "~/.config/zellij"

[claude]
source = "claude/settings.json"
target = "~/.claude/settings.json"

[cursor]
source = "cursor/mcp.json"
target = "~/.cursor/mcp.json"

[zshrc_linux]
source = ".zshrc.linux"
target = "~/.zshrc.linux"
os = "linux"

[zshrc_darwin]
source = ".zshrc.darwin"
target = "~/.zshrc.darwin"
os = "darwin"

[waybar]
source = "config/waybar"
target = "~/.config/waybar"
os = "linux"

[wallpapers]
source = "Wallpapers"
target = "~/Wallpapers"

[hypr]
source = "config/hypr"
target = "~/.config/hypr"
os = "linux"

[qmk_udev]
source = "config/udev/50-qmk.rules"
target = "/etc/udev/rules.d/50-qmk.rules"
postinstall = "sudo udevadm control --reload-rules && sudo udevadm trigger"
os = "linux"

[aerospace]
source = ".aerospace.toml"
target = "~/.aerospace.toml"
os = "darwin"

[opencode]
source = "config/opencode/opencode.json"
target = "~/.config/opencode/opencode.json"

[tmux]
source = "config/tmux/tmux.conf"
target = "~/.config/tmux/tmux.conf"

# Only config.toml is tracked — the rest of ~/.config/herdr (logs, sockets,
# session.json, installed plugins) is runtime state, not dotfiles.
# herdr plugins (install once, needs herdr >= 0.7.3):
#   herdr plugin install lmilojevicc/herdr-splits.nvim      # nav + resize
#   herdr plugin install makyinmars/herdr-context.nvim      # send context to agents
#   herdr plugin link  ~/Project/self/dotfiles/config/herdr/plugins/open-in-nvim
#     ^ local plugin (tracked below): click a path in any pane → open in sibling nvim
[herdr]
source = "config/herdr/config.toml"
target = "~/.config/herdr/config.toml"

# worktrunk (wt) — only config.toml is tracked; approvals.toml, state, and logs
# under ~/.config/worktrunk are runtime state. The post-switch hook opens each
# worktree in herdr; the .zshrc wt wrapper adds --no-cd inside herdr.
[worktrunk]
source = "config/worktrunk/config.toml"
target = "~/.config/worktrunk/config.toml"

[hammerspoon]
source = "config/hammerspoon/init.lua"
target = "~/.hammerspoon/init.lua"
os = "darwin"

[op_env]
source = "scripts/op-env"
target = "~/.local/bin/op-env"

[codex_notify]
source = "scripts/codex-notify"
target = "~/.local/bin/codex-notify"

[tmux_sessions]
source = "scripts/tmux-sessions"
target = "~/.local/bin/tmux-sessions"

[tmux_open_in_nvim]
source = "scripts/tmux-open-in-nvim"
target = "~/.local/bin/tmux-open-in-nvim"

[lazygit_darwin]
source = "config/lazygit/config.yml"
target = "~/Library/Application Support/lazygit/config.yml"
os = "darwin"

[lazygit_linux]
source = "config/lazygit/config.yml"
target = "~/.config/lazygit/config.yml"
os = "linux"

# ~/.config/emacs is a Doom Emacs clone (managed by `doom`, not dotfiles).
# Only the private Doom config is tracked here.
[doom]
source = "config/doom"
target = "~/.config/doom"
